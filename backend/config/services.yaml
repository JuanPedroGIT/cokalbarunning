# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    Aws\S3\S3Client:
        factory: ['@App\Infrastructure\Storage\S3ClientFactory', 'create']
        arguments:
            $accountId: '%env(R2_ACCOUNT_ID)%'
            $accessKeyId: '%env(R2_ACCESS_KEY_ID)%'
            $accessKeySecret: '%env(R2_ACCESS_KEY_SECRET)%'

    App\Infrastructure\Storage\R2StorageAdapter:
        arguments:
            $accountId: '%env(R2_ACCOUNT_ID)%'
            $accessKeyId: '%env(R2_ACCESS_KEY_ID)%'
            $accessKeySecret: '%env(R2_ACCESS_KEY_SECRET)%'
            $bucket: '%env(R2_BUCKET_NAME)%'
            $publicUrl: '%env(R2_PUBLIC_URL)%'

    App\Domain\Media\Port\StoragePort:
        alias: App\Infrastructure\Storage\R2StorageAdapter

    App\Domain\Media\Service\ImageProcessorInterface:
        alias: App\Infrastructure\Service\GdImageProcessor

    App\Command\GenerateThumbnailsCommand:
        arguments:
            $s3Client: '@Aws\S3\S3Client'
            $bucket: '%env(R2_BUCKET_NAME)%'
            $publicUrl: '%env(R2_PUBLIC_URL)%'

    App\Command\MigrateStorageUrlsToPathsCommand:
        arguments:
            $publicUrl: '%env(R2_PUBLIC_URL)%'

    App\Domain\Club\Repository\SponsorRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineSponsorRepository

    App\Domain\Club\Repository\ClubMemberRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineClubMemberRepository

    App\Domain\Media\Repository\PhotoRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrinePhotoRepository

    App\Domain\Media\Repository\BlogPostRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineBlogPostRepository

    App\Domain\Race\Repository\RaceEditionRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineRaceEditionRepository

    App\Domain\Race\Repository\RaceDocumentRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineRaceDocumentRepository

    App\Domain\Results\Repository\ResultRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineResultRepository
        public: true

    App\Domain\SocialPublishing\Repository\SocialPublishLogRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineSocialPublishLogRepository

    App\Domain\SocialPublishing\Port\SocialPublisherPort:
        alias: App\Infrastructure\SocialPublishing\N8n\N8nSocialPublisher

    App\Infrastructure\SocialPublishing\N8n\N8nSocialPublisher:
        arguments:
            $webhookUrl: '%env(N8N_WEBHOOK_URL)%'
            $authHeader: '%env(N8N_WEBHOOK_AUTH_HEADER)%'
            $authToken: '%env(N8N_WEBHOOK_AUTH_TOKEN)%'
            $websiteUrl: '%env(APP_PUBLIC_URL)%'

    App\Infrastructure\Http\Controller\Api\Webhook\N8nWebhookController:
        arguments:
            $callbackToken: '%env(N8N_CALLBACK_TOKEN)%'

    App\Domain\Notification\Repository\EmailSendLogRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineEmailSendLogRepository

    App\Command\SendPendingBibEmailsCommand:
        arguments:
            $senderEmail: '%env(MAILER_SENDER_EMAIL)%'
            $delaySeconds: '%env(int:BIB_EMAIL_DELAY_SECONDS)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
