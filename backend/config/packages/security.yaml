security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        api_login:
            pattern: ^/api/v1/auth/login
            stateless: true
            json_login:
                check_path: /api/v1/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        api:
            pattern: ^/api/v1
            stateless: true
            jwt: ~
        main:
            lazy: true
            provider: app_user_provider

    role_hierarchy:
        ROLE_ADMIN: [ROLE_EDITOR]

    access_control:
        - { path: ^/api/v1/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/auth/refresh, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/webhook/n8n, roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/me, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/v1/admin/users, roles: ROLE_ADMIN }
        - { path: ^/api/v1/admin/posts, roles: ROLE_EDITOR }
        - { path: ^/api/v1/admin/photos, roles: ROLE_EDITOR }
        - { path: ^/api/v1/admin, roles: ROLE_ADMIN }
        - { path: ^/api/v1, roles: PUBLIC_ACCESS, methods: [GET] }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
