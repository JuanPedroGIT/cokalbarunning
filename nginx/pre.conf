server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # API proxy to backend
    location /api {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
    }

    # Direct PHP file access blocked
    location ~ \.php$ {
        return 404;
    }

    # Static uploads from backend
    location /uploads {
        alias /var/www/backend/public/uploads;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
